<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catastrophe Risk Pipeline - Architecture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a1a1a;
            margin-bottom: 8px;
            font-size: 32px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 16px;
        }
        .diagram {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
        }
        .tech-stack {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 32px;
        }
        .tech-item {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #4285f4;
        }
        .tech-item h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        .tech-item p {
            font-size: 16px;
            color: #1a1a1a;
            font-weight: 500;
        }
        .footer {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 32px;
        }
        .footer a {
            color: #4285f4;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌪️ Catastrophe Risk Intelligence Pipeline</h1>
        <p class="subtitle">Real-time streaming data pipeline on Google Cloud Platform</p>
        
        <div class="diagram">
            <svg width="100%" viewBox="0 0 680 520">
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </marker>
                </defs>
                
                <!-- APIs Layer -->
                <rect x="40" y="20" width="180" height="60" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
                <text x="130" y="45" text-anchor="middle" font-size="14" font-weight="500" fill="#1a73e8">Public APIs</text>
                <text x="130" y="65" text-anchor="middle" font-size="12" fill="#5f6368">NOAA · USGS · FEMA</text>
                
                <rect x="260" y="20" width="180" height="60" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
                <text x="350" y="45" text-anchor="middle" font-size="14" font-weight="500" fill="#1a73e8">Cloud Functions</text>
                <text x="350" y="65" text-anchor="middle" font-size="12" fill="#5f6368">Data Ingestion</text>
                
                <rect x="480" y="20" width="160" height="60" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
                <text x="560" y="45" text-anchor="middle" font-size="14" font-weight="500" fill="#1a73e8">Cloud Scheduler</text>
                <text x="560" y="65" text-anchor="middle" font-size="12" fill="#5f6368">Every 15 mins</text>
                
                <!-- Arrows Layer 1 -->
                <line x1="220" y1="50" x2="258" y2="50" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
                <line x1="440" y1="50" x2="478" y2="50" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
                <line x1="560" y1="80" x2="560" y2="108" stroke="#666" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
                <line x1="560" y1="108" x2="350" y2="108" stroke="#666" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
                <line x1="350" y1="108" x2="350" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
                
                <!-- Pub/Sub -->
                <rect x="240" y="140" width="220" height="60" rx="8" fill="#fef7e0" stroke="#f9ab00" stroke-width="1"/>
                <text x="350" y="165" text-anchor="middle" font-size="14" font-weight="500" fill="#e37400">Cloud Pub/Sub</text>
                <text x="350" y="185" text-anchor="middle" font-size="12" fill="#5f6368">Message Streaming</text>
                
                <line x1="350" y1="80" x2="350" y2="138" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
                
                <!-- Dataflow -->
                <rect x="240" y="240" width="220" height="60" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1"/>
                <text x="350" y="265" text-anchor="middle" font-size="14" font-weight="500" fill="#188038">Cloud Dataflow</text>
                <text x="350" y="285" text-anchor="middle" font-size="12" fill="#5f6368">Apache Beam Pipeline</text>
                
                <line x1="350" y1="200" x2="350" y2="238" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
                
                <!-- BigQuery -->
                <rect x="240" y="340" width="220" height="60" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1"/>
                <text x="350" y="365" text-anchor="middle" font-size="14" font-weight="500" fill="#1a73e8">BigQuery</text>
                <text x="350" y="385" text-anchor="middle" font-size="12" fill="#5f6368">Partitioned & Clustered</text>
                
                <line x1="350" y1="300" x2="350" y2="338" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
                
                <!-- Looker Studio -->
                <rect x="240" y="440" width="220" height="60" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1"/>
                <text x="350" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#c5221f">Looker Studio</text>
                <text x="350" y="485" text-anchor="middle" font-size="12" fill="#5f6368">Live Dashboard</text>
                
                <line x1="350" y1="400" x2="350" y2="438" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
                
                <!-- Cloud Composer Side -->
                <rect x="30" y="240" width="160" height="140" rx="8" fill="#f3e8fd" stroke="#a142f4" stroke-width="1" stroke-dasharray="4 2"/>
                <text x="110" y="265" text-anchor="middle" font-size="14" font-weight="500" fill="#7627bb">Cloud Composer</text>
                <text x="110" y="285" text-anchor="middle" font-size="12" fill="#5f6368">Orchestration</text>
                <text x="110" y="310" text-anchor="middle" font-size="11" fill="#5f6368">• Schedule</text>
                <text x="110" y="330" text-anchor="middle" font-size="11" fill="#5f6368">• Monitor</text>
                <text x="110" y="350" text-anchor="middle" font-size="11" fill="#5f6368">• Retry</text>
                <text x="110" y="370" text-anchor="middle" font-size="11" fill="#5f6368">• Alert</text>
                
                <!-- Terraform Side -->
                <rect x="490" y="340" width="150" height="80" rx="8" fill="#e8eaed" stroke="#5f6368" stroke-width="1" stroke-dasharray="4 2"/>
                <text x="565" y="365" text-anchor="middle" font-size="14" font-weight="500" fill="#3c4043">Terraform</text>
                <text x="565" y="385" text-anchor="middle" font-size="12" fill="#5f6368">Infrastructure</text>
                <text x="565" y="405" text-anchor="middle" font-size="12" fill="#5f6368">as Code</text>
            </svg>
        </div>
        
        <div class="tech-stack">
            <div class="tech-item">
                <h3>INGESTION</h3>
                <p>Cloud Functions</p>
            </div>
            <div class="tech-item">
                <h3>STREAMING</h3>
                <p>Pub/Sub</p>
            </div>
            <div class="tech-item">
                <h3>PROCESSING</h3>
                <p>Dataflow + Beam</p>
            </div>
            <div class="tech-item">
                <h3>STORAGE</h3>
                <p>BigQuery</p>
            </div>
            <div class="tech-item">
                <h3>ORCHESTRATION</h3>
                <p>Cloud Composer</p>
            </div>
            <div class="tech-item">
                <h3>INFRASTRUCTURE</h3>
                <p>Terraform</p>
            </div>
        </div>
        
        <div class="footer">
            <p>View source code on <a href="https://github.com/YOUR-USERNAME/gcp-hands-on-projects" target="_blank">GitHub</a></p>
        </div>
    </div>
</body>
</html>
